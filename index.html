<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Calculadora de Lajes</title>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    #splash {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100vh;
    background: white;
    color: black;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    z-index: 9999;
  }

  #splash h1 {
    margin-bottom: 20px;
    font-size: 28px;
  }

  #logo {
    width: 120px;
    margin: 20px 0;
  }

  .creditos {
    position: absolute;
    bottom: 30px;
    text-align: center;
    font-size: 14px;
  }

  #btnEntrar {
  margin-top: 20px;
  padding: 12px 25px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

  #btnEntrar:hover {
    background: #16a34a;
  }

  .card {
    display: none;
    background: #1e293b;
    padding: 30px;
    border-radius: 16px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }

  input {
    width: 100%;
    padding: 10px;
    margin-top: 15px;
    border-radius: 8px;
    border: none;
    outline: none;
  }

  button {
    padding: 10px;
    margin-top: 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    width: 48%;
  }

  .primary {
    background: #22c55e;
    color: white;
  }

  .secondary {
    background: #334155;
    color: white;
  }

  progress {
    width: 100%;
    margin-top: 15px;
  }

  pre {
    text-align: left;
    margin-top: 15px;
    white-space: pre-wrap;
  }
  </style>
</head>

<body>

<div id="splash">
  <h1>Calculadora de Lajes</h1>

  <img src="./img/ifce_logo.png" id="logo" />
  <button id="btnEntrar">Entrar</button>

  <div class="creditos">
    <p>Lucas Fernandes Pinheiro de Sousa</p>
    <p>lucferpinheiro@gmail.com</p>

    <p>Francisco Paulino Arruda Filho</p>
    <p>fpaulinofilho04@gmail.com</p>
  </div>
</div>

<div class="card">
  <h2 id="titulo"></h2>
  <p id="erro" style="color:#f87171; font-size:12px; display:none;"></p>
  <img id="imagem" style="width:100%; margin-top:10px; border-radius:10px; display:none;" />

  <input id="input" type="number" placeholder="Digite valor" />

  <progress id="progress" value="0" max="6"></progress>

  <div style="display:flex; justify-content: space-between;">
    <button id="btnVoltar" class="secondary" onclick="voltar()">Voltar</button>
    <button id="btnProximo" class="primary" onclick="proximo()">Próximo</button>
  </div>

  <pre id="resultado"></pre>
</div>

<script type="module" src="renderer.js"></script>

</body>
</html>
